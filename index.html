

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Dashboard | Nikita & Vanya</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body {
        background-color: #1a1a1a;
        color: #d1d1d1;
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 1000px;
    }

    .rainbow-line {
        height: 1px;
        width: 100%;
        background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
        background-size: 200% 100%;
        animation: moveGradient 5s linear infinite;
        margin-bottom: 20px;
    }

    @keyframes moveGradient {
        0% { background-position: 0% 0%; }
        100% { background-position: 200% 0%; }
    }

    .info-banner {
        border: 1px solid #4caf50;
        background: rgba(76, 175, 80, 0.05);
        color: #4caf50;
        padding: 10px 15px;
        font-size: 13px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    max-width: 600px {
        .grid {
            grid-template-columns: 1fr;
        }
    }

    .card {
        background: #252525;
        border: 1px solid #333;
        padding: 20px;
        position: relative;
    }

    .card-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 15px;
        display: block;
    }

    input, textarea {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        padding: 12px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 14px;
        margin-bottom: 10px;
    }

    .analytics-link {
        display: block;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        text-decoration: none;
        padding: 12px;
        margin-bottom: 10px;
        text-align: center;
        font-size: 14px;
    }

    .analytics-link:hover {
        background: #333;
    }

    button {
        background: #333;
        color: #fff;
        border: 1px solid #444;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 13px;
        transition: 0.2s;
    }

    button:hover {
        background: #444;
    }

    .btn-primary {
        background: #fff;
        color: #000;
        border: none;
        font-weight: bold;
        width: 100%;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #252525;
        border: 1px solid #333;
        padding: 30px;
        width: 90%;
        max-width: 600px;
    }
</style>
</head>
<body>
<div class="container">
    <div class="rainbow-line"></div>
<div class="info-banner">
    <span>Partner: Vanya</span>
    <span>|</span>
    <span>Status: Connected</span>
</div>

<div class="grid">
    <!-- Analytics -->
    <div class="card">
        <span class="card-label">Analytics</span>
        <a href="https://studio.youtube.com" target="_blank" class="analytics-link">YouTube Studio</a>
        <a href="https://socialblade.com" target="_blank" class="analytics-link">Social Blade</a>
    </div>

    <!-- Weekly Plans -->
    <div class="card">
        <span class="card-label">Weekly Plans</span>
        <textarea id="plansInput" placeholder="Enter plans..."></textarea>
        <button class="btn-primary" onclick=

updateData('plans', 'plansInput')">Update Plans</button>
    </div>

    <!-- References -->
    <div class="card">
        <span class="card-label">References</span>
        <textarea id="refsInput" placeholder="Links to cool videos/previews..."></textarea>
        <button class="btn-primary" onclick="updateData('references', 'refsInput')">Update Refs</button>
    </div>

    <!-- Idea Incubator -->
    <div class="card">
        <span class="card-label">Idea Incubator</span>
        <button class="btn-primary" onclick="toggleModal(true)">Open Ideas Notepad</button>
    </div>
</div>
</div>
<!-- Modal -->
<div id="ideasModal" class="modal">
    <div class="modal-content">
        <span class="card-label">Ideas Notepad</span>
        <textarea id="ideasInput" style="height: 300px;" placeholder="Dump your ideas here..."></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-primary" onclick="updateData('ideas', 'ideasInput')">Save & Sync</button>
            <button onclick="toggleModal(false)">Close</button>
        </div>
    </div>
</div>
<script>
    // Initialize Supabase
    const supabaseUrl = 'https://vnutkfdyphcvvgixhgdb.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZudXRrZmR5cGhjdnZnaXhoZ2RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTMwMDEsImV4cCI6MjA5NzI2OTAwMX0.wLpRW_M5fTrR1m9FrLGlmNZI7xXSASj2DlbN2DxgqUw';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function updateData(column, inputId) {
        const value = document.getElementById(inputId).value;
        const { error } = await _supabase
            .from('dashboard')
            .update({ [column]: value })
            .eq('id', 1);
        
        if (error) alert('Error: ' + error.message);
        else alert('Updated successfully!');
    }

    function toggleModal(show) {
        document.getElementById('ideasModal').style.display = show ? 'flex' : 'none';
    }

    // Load initial data
    async function loadData() {
        const { data, error } = await _supabase
            .from('dashboard')
            .select('*')
            .eq('id', 1)
            .single();
        
        if (data) {
            document.getElementById('plansInput').value = data.plans || '';
            document.getElementById('refsInput').value = data.references || '';
            document.getElementById('ideasInput').value = data.ideas || '';
        }
    }
    loadData();
</script>
</body>
</html>"
