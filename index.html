    * {

    body {

        background-image: linear-gradient(var(--overlay), var(--overlay)), var(--bg-image);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;

        padding: 30px;
        text-align: center;
    }

        margin-bottom: 30px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .card {
        border: 1px solid var(--border);
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .card:hover {
        background: #111;
        border-color: #555;
    }

    .btn {
        background: none;
        border: 1px solid #fff;
        color: #fff;
        padding: 10px 20px;
        cursor: pointer;
        font-family: inherit;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .btn:hover {
        background: #fff;
        color: #000;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .modal-content {
        background: #000;
        border: 1px solid var(--border);
        padding: 40px;
        width: 90%;
        max-width: 600px;
    }

    textarea {
        width: 100%;
        height: 200px;
        background: #111;
        border: 1px solid var(--border);
        color: #fff;
        padding: 10px;
        margin: 20px 0;
        font-family: inherit;
    }
</style>
</head>
