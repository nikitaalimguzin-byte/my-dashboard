
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --sidebar-bg: #111;
            --accent-color: #00ff41;
            --text-color: #fff;
            --card-bg: rgba(20, 20, 20, 0.85);
        }
    body {
        margin: 0;
        font-family: 'Courier New', Courier, monospace;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        height: 100vh;
        overflow: hidden;
        /* Updated background image link */
        background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://i.postimg.cc/v4m0m0m/money-kid.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    /* Sidebar */
    .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--accent-color);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        z-index: 10;
    }

    .sidebar h1 {
        font-size: 1.2rem;
        color: var(--accent-color);
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .nav-btn {
        background: none;
        border: 1px solid #333;
        color: #888;
        padding: 15px;
        text-align: left;
        margin-bottom: 15px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        font-size: 0.8rem;
        width: 100%;
    }

    .nav-btn:hover, .nav-btn.active {
        border-color: var(--accent-color);
        color: var(--accent-color);
        background: rgba(0, 255, 65, 0.05);
    }

    .nav-btn span {
        display: block;
        font-size: 0.6rem;
        margin-top: 5px;
        opacity: 0.7;
    }

    /* Main Content */
    .main-content {
        flex-grow: 1;
        padding: 40px;
        overflow-y: auto;
        position: relative;
    }

    .section {
        display: none;
    }

    .section.active {
        display: block;
    }

    .card {
        background: var(--card-bg);
        border: 1px solid #333;
        padding: 20px;
        margin-bottom: 20px;
        backdrop-filter: blur(10px);
    }

    h2 {
        color: var(--accent-color);
        text-transform: uppercase;
        font-size: 1rem;
        margin-top: 0;
    }

    textarea, input {
        width: 100%;
        background: #000;
        border: 1px solid #333;
        color: var(--accent-color);
        padding: 10px;
        margin-top: 10px;
        box-sizing: border-box;
        font-family: inherit;
    }

    button.action-btn {
        background: var(--accent-color);
        color: #000;
        border: none;
        padding: 10px 20px;
        margin-top: 10px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
    }

    .status {
        font-size: 0.7rem;
        margin-top: 10px;
        color: #888;
    }
</style>
</head>
<body>
<div class="sidebar">
    <h1>Project Dashboard</h1>
    <button class="nav-btn active" onclick="showSection('incubator')">

    </button>
    <button class="nav-btn" onclick="showSection('references')">
        References
        <span>Style inspiration</span>

    <button class="nav-btn" onclick="window.open('https://studio.youtube.com', '_blank')">
        Analytics
        <span>Channel growth</span>
    </button>
    
    <div style="margin-top: auto;">
        <button class="nav-btn" onclick="syncData()" style="border-color: var(--accent-color);">
            Sync to Supabase
        </button>
        <div id="sync-status" class="status">Ready</div>
    </div>
</div>

<div class="main-content">

</div>

<script>
    const SUPABASE_URL = 'https://vnutkfdyphcvvgixhgdb.supabase.co';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function saveIdea() {
        const content = document.getElementById('idea-input').value;
        if (!content) return;
        
        const { error } = await supabaseClient.from('projects').insert([{ ideas: content }]);
        if (error) {
            alert('Error: ' + error.message);
        } else {
            document.getElementById('idea-input').value = '';
            loadData();
        }
    }

    async function saveRef() {
        const title = document.getElementById('ref-title').value;
        const link = document.getElementById('ref-link').value;
        if (!title || !link) return;

        const { error } = await supabaseClient.from('projects').insert([{ references: `${title}: ${link}` }]);
        if (error) {
            alert('Error: ' + error.message);
        } else {
            document.getElementById('ref-title').value = '';
            document.getElementById('ref-link').value = '';
            loadData();
        }
    }

    async function loadData() {
        const { data, error } = await supabaseClient.from('projects').select('*').order('created_at', { ascending: false });
        if (error) return;

        const ideasList = document.getElementById('ideas-list');
        const refsList = document.getElementById('refs-list');
        ideasList.innerHTML = '<h2>Active Ideas</h2>';
        refsList.innerHTML = '<h2>Saved References</h2>';

        data.forEach(item => {
            if (item.ideas) {
                ideasList.innerHTML += `<div class="card">${item.ideas}</div>`;
            }
            if (item.references) {
                refsList.innerHTML += `<div class="card">${item.references}</div>`;
            }
        });
    }

    async function syncData() {
        document.getElementById('sync-status').innerText = 'Syncing...';
        await loadData();
        document.getElementById('sync-status').innerText = 'Last sync: ' + new Date().toLocaleTimeString();
    }

    loadData();
</script>
</body>
